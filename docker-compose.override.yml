# Dev overrides: hot-reload for all services.
# This file is merged automatically by `docker compose up`.
services:
  backend:
    build:
      target: build
    volumes:
      - ./backend/Goalz:/src
    working_dir: /src/Goalz.API
    entrypoint: ["dotnet", "watch", "run", "--no-launch-profile"]
    environment:
      ASPNETCORE_URLS: http://+:8080

  app:
    build:
      target: build
    volumes:
      - ./frontend/app:/app
      - /app/node_modules
    working_dir: /app
    command: ["npm", "run", "dev", "--", "--host", "0.0.0.0", "--port", "80"]
    ports:
      - "3000:80"

  dashboard:
    build:
      target: build
    volumes:
      - ./frontend/dashboard:/app
      - /app/node_modules
    working_dir: /app
    command: ["npm", "run", "dev", "--", "--host", "0.0.0.0", "--port", "80"]
    ports:
      - "3001:80"
