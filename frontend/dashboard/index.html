<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <!-- unsafe-eval required by Leaflet canvas renderer and Recharts -->
    <meta http-equiv="Content-Security-Policy" content="
      default-src 'self';
      script-src  'self' 'unsafe-eval' cdn.jsdelivr.net *.fontawesome.com;
      style-src   'self' 'unsafe-inline' fonts.googleapis.com *.fontawesome.com;
      font-src    'self' fonts.gstatic.com *.fontawesome.com;
      img-src     'self' data: blob: *.tile.openstreetmap.org tile.openstreetmap.org *.supabase.co *.basemaps.cartocdn.com server.arcgisonline.com;
      connect-src 'self' https://goalz-api-237169763190.europe-west1.run.app http://localhost:* ws://localhost:* http://127.0.0.1:* ws://127.0.0.1:* *.fontawesome.com;
    " />
    <title>Dashboard</title>

    <!--
      leaflet-image has no npm package that works in Vite — loaded via CDN.
      All other Leaflet libs (leaflet, leaflet-draw, leaflet.markercluster) are npm imports.
    -->
    <script src="https://cdn.jsdelivr.net/npm/leaflet-image@0.4.0/leaflet-image.js"></script>

    <!-- Inter font -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
      rel="stylesheet"
    />

    <!-- Font Awesome -->
    <script src="https://kit.fontawesome.com/d66c1fe273.js" crossorigin="anonymous"></script>
  </head>
  <body style="background-color: #F5F7F7;">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
