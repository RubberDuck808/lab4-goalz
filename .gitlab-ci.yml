stages:
  - deploy
  - mobile

variables:
  NODE_VERSION: "20"
  DOTNET_VERSION: "9.0"
  GCP_PROJECT: "goalz-loggin"
  GCP_REGION: "europe-west1"

# ------------------------
# BACKEND DEPLOY
# ------------------------
backend:deploy:
  stage: deploy
  tags: [docker]
  image: google/cloud-sdk:alpine
  before_script:
    - gcloud auth activate-service-account --key-file=$GCP_SERVICE_ACCOUNT_KEY
    - gcloud config set project $GCP_PROJECT
  script:
    - echo "Building and pushing backend image"
    - cd backend/Goalz
    - BUILD_ID=$(gcloud builds submit --config cloudbuild.yaml --project $GCP_PROJECT . --async --format='value(id)')
    - echo "Build submitted $BUILD_ID — polling for completion"

    - |
      while true; do
        STATUS=$(gcloud builds describe $BUILD_ID --project $GCP_PROJECT --format='value(status)')
        echo "Status: $STATUS"

        if [ "$STATUS" = "SUCCESS" ]; then
          break
        fi

        if [ "$STATUS" = "FAILURE" ] || [ "$STATUS" = "CANCELLED" ] || [ "$STATUS" = "TIMEOUT" ]; then
          echo "Build failed"
          exit 1
        fi

        sleep 10
      done

    - echo "Deploying backend to Cloud Run"
    - >
      gcloud run deploy goalz-api
      --image gcr.io/$GCP_PROJECT/goalz-api
      --region $GCP_REGION
      --allow-unauthenticated
      --port 8080
      --project $GCP_PROJECT
      --update-env-vars "^|^ConnectionStrings__DefaultConnection=$DB_CONNECTION_STRING|^Jwt__Secret=$JWT_SECRET|^AllowedOrigins=http://localhost:5173,http://localhost:5174,http://localhost:5175,http://localhost:8081,https://goalz-dashboard-237169763190.europe-west1.run.app,https://www.loggin-dashboard.com"
  only:
    - main
    - dev
    - feature/pending-element-submission

# ------------------------
# DASHBOARD DEPLOY
# ------------------------
dashboard:deploy:
  stage: deploy
  tags: [docker]
  image: google/cloud-sdk:alpine
  before_script:
    - gcloud auth activate-service-account --key-file=$GCP_SERVICE_ACCOUNT_KEY
    - gcloud config set project $GCP_PROJECT
  script:
    - echo "Building and pushing dashboard image"
    - cd frontend/dashboard
    - BUILD_ID=$(gcloud builds submit --config cloudbuild.yaml --project $GCP_PROJECT . --async --format='value(id)')
    - echo "Build submitted $BUILD_ID — polling for completion"

    - |
      while true; do
        STATUS=$(gcloud builds describe $BUILD_ID --project $GCP_PROJECT --format='value(status)')
        echo "Status: $STATUS"

        if [ "$STATUS" = "SUCCESS" ]; then
          break
        fi

        if [ "$STATUS" = "FAILURE" ] || [ "$STATUS" = "CANCELLED" ] || [ "$STATUS" = "TIMEOUT" ]; then
          echo "Build failed"
          exit 1
        fi

        sleep 10
      done

    - echo "Deploying dashboard to Cloud Run"
    - >
      gcloud run deploy goalz-dashboard
      --image gcr.io/$GCP_PROJECT/goalz-dashboard
      --region $GCP_REGION
      --allow-unauthenticated
      --port 8080
      --project $GCP_PROJECT
  only:
    - main
    - dev
    - feature/pending-element-submission

# ------------------------
# MOBILE EAS UPDATE
# ------------------------
mobile:eas-update:
  stage: mobile
  tags: [docker]
  image: node:$NODE_VERSION
  before_script:
    - npm install -g eas-cli
    - cd frontend/mobile
    - npm ci
  script:
    - eas update --branch $CI_COMMIT_REF_NAME --message "$CI_COMMIT_TITLE" --non-interactive
  only:
    - main
    - dev
    - feature/pending-element-submission
