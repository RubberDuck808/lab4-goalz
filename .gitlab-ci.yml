stages:
  - build
  - test
  - sonarqube
  - deploy

variables:
  NODE_VERSION: "20"
  DOTNET_VERSION: "9.0"
  GCP_PROJECT: "goalz-loggin"
  GCP_REGION: "europe-west1"

# ------------------------
# FRONTEND BUILD
# ------------------------
frontend:build:
  stage: build
  image: node:$NODE_VERSION
  script:
    - echo "Building frontend/dashboard"
    - cd frontend/dashboard
    - npm ci
    - npm run build

# ------------------------
# BACKEND BUILD
# ------------------------
backend:build:
  stage: build
  image: mcr.microsoft.com/dotnet/sdk:$DOTNET_VERSION
  script:
    - echo "Restoring backend"
    - cd backend/Goalz
    - dotnet restore

    - echo "Building backend"
    - dotnet build --no-restore --configuration Release

# ------------------------
# BACKEND TEST WITH COVERAGE
# ------------------------
backend:test:
  stage: test
  image: mcr.microsoft.com/dotnet/sdk:$DOTNET_VERSION
  script:
    - echo "Restoring backend"
    - cd backend/Goalz
    - dotnet restore

    - echo "Running tests with coverage"
    - dotnet test Goalz.Test/Goalz.Test.csproj --no-restore --configuration Release --collect:"XPlat Code Coverage"
  artifacts:
    when: always
    paths:
      - backend/Goalz/**/TestResults/

# ------------------------
# SONARCLOUD ANALYSIS
# ------------------------
sonarqube:analysis:
  stage: sonarqube
  image: mcr.microsoft.com/dotnet/sdk:$DOTNET_VERSION
  variables:
    SONAR_USER_HOME: "${CI_PROJECT_DIR}/.sonar"
    GIT_DEPTH: "0"
  dependencies:
    - backend:test
  script:
    - dotnet tool install --global dotnet-sonarscanner
    - export PATH="$PATH:/root/.dotnet/tools"

    - cd backend/Goalz

    - dotnet sonarscanner begin /k:"${SONAR_PROJECT_KEY}" /o:"${SONAR_ORGANIZATION}" /d:sonar.host.url="https://sonarcloud.io" /d:sonar.token="${SONAR_TOKEN}" /d:sonar.cs.opencover.reportsPaths="../../**/coverage.cobertura.xml"
    - dotnet build --configuration Release
    - dotnet sonarscanner end /d:sonar.token="${SONAR_TOKEN}"

  cache:
    key: "${CI_JOB_NAME}"
    paths:
      - .sonar/cache

  allow_failure: true
  only:
    - ci/sonarqube
    - dev
    - main

# ------------------------
# BACKEND DEPLOY
# ------------------------
backend:deploy:
  stage: deploy
  image: google/cloud-sdk:alpine
  before_script:
    - gcloud auth activate-service-account --key-file=$GCP_SERVICE_ACCOUNT_KEY
    - gcloud config set project $GCP_PROJECT
  script:
    - echo "Building and pushing backend image"
    - cd backend/Goalz
    - BUILD_ID=$(gcloud builds submit --config cloudbuild.yaml --project $GCP_PROJECT . --async --format='value(id)')
    - echo "Build submitted $BUILD_ID — polling for completion"

    - |
      while true; do
        STATUS=$(gcloud builds describe $BUILD_ID --project $GCP_PROJECT --format='value(status)')
        echo "Status: $STATUS"

        if [ "$STATUS" = "SUCCESS" ]; then
          break
        fi

        if [ "$STATUS" = "FAILURE" ] || [ "$STATUS" = "CANCELLED" ] || [ "$STATUS" = "TIMEOUT" ]; then
          echo "Build failed"
          exit 1
        fi

        sleep 10
      done

    - echo "Deploying backend to Cloud Run"
    - >
      gcloud run deploy goalz-api
      --image gcr.io/$GCP_PROJECT/goalz-api
      --region $GCP_REGION
      --allow-unauthenticated
      --port 8080
      --project $GCP_PROJECT
      --update-env-vars "^|^ConnectionStrings__DefaultConnection=$DB_CONNECTION_STRING|^Jwt__Secret=$JWT_SECRET|^AllowedOrigins=http://localhost:5173,http://localhost:5174,http://localhost:5175,http://localhost:8081,https://goalz-dashboard-237169763190.europe-west1.run.app,https://www.loggin-dashboard.com"
  only:
    - main
    - dev
    - feature/deployment
    - feature/mobile-profile-leaderboard-accessibility
    - fix/party-role-assignment-and-game-completion

# ------------------------
# DASHBOARD DEPLOY
# ------------------------
dashboard:deploy:
  stage: deploy
  image: google/cloud-sdk:alpine
  before_script:
    - gcloud auth activate-service-account --key-file=$GCP_SERVICE_ACCOUNT_KEY
    - gcloud config set project $GCP_PROJECT
  script:
    - echo "Building and pushing dashboard image"
    - cd frontend/dashboard
    - BUILD_ID=$(gcloud builds submit --config cloudbuild.yaml --project $GCP_PROJECT . --async --format='value(id)')
    - echo "Build submitted $BUILD_ID — polling for completion"

    - |
      while true; do
        STATUS=$(gcloud builds describe $BUILD_ID --project $GCP_PROJECT --format='value(status)')
        echo "Status: $STATUS"

        if [ "$STATUS" = "SUCCESS" ]; then
          break
        fi

        if [ "$STATUS" = "FAILURE" ] || [ "$STATUS" = "CANCELLED" ] || [ "$STATUS" = "TIMEOUT" ]; then
          echo "Build failed"
          exit 1
        fi

        sleep 10
      done

    - echo "Deploying dashboard to Cloud Run"
    - >
      gcloud run deploy goalz-dashboard
      --image gcr.io/$GCP_PROJECT/goalz-dashboard
      --region $GCP_REGION
      --allow-unauthenticated
      --port 8080
      --project $GCP_PROJECT
  only:
    - main
    - dev
    - feature/mobile-profile-leaderboard-accessibility
    - fix/party-role-assignment-and-game-completion